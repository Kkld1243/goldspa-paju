<!--
================================================================================
  Claude Code 지시서 — 이 파일 하나로 360 가상투어 웹페이지를 완성해줘.

  [대상] 정적 HTML 사이트.

  [해야 할 일]
  1. 이 tour.html 이 그대로 브라우저에서 뜨도록 필요한 파일을 준비할 것.
     - 360 뷰어 라이브러리는 Pannellum (MIT). 아래 <head> 가 참조하는 경로:
         lib/pannellum.js , lib/pannellum.css
       이 두 파일을 준비해서 tour.html 과 같은 위치의 lib/ 폴더에 둘 것.
       (npm 의 'pannellum' 패키지 build/pannellum.js, build/pannellum.css 를 복사하면 됨.
        CDN https://cdnjs.cloudflare.com/ajax/libs/pannellum/2.5.6/ 도 가능하지만,
        오프라인·방화벽 대비해 로컬 lib/ 배치를 권장.)
  2. 지점 사진(equirectangular, 가로:세로 = 2:1)은 images/ 폴더에 두고,
     아래 SCENES 배열의 image 경로와 일치시킬 것. 사진은 함께 전달됨.
     사진이 아직 없으면 images/ 폴더와 자리표시 주석만 남겨둘 것.
  3. 로컬 확인은 정적 서버로:  npx serve  또는  python3 -m http.server
     (file:// 로 열면 브라우저 보안 때문에 사진이 안 뜸 — 반드시 서버로.)
  4. 사이트에 붙일 때는 이 폴더를 통째로 올리고 /tour.html 로 링크하거나
     <iframe src="tour.html" style="width:100%;height:600px;border:0"></iframe> 로 삽입.

  [편집 포인트] 아래 <script> 안의 SCENES 배열만 고치면 지점/핫스팟이 바뀜.
  [건드리지 말 것] lib/ 안의 pannellum 파일, SCENES 아래의 로직 코드.
================================================================================
-->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>파주 골드스파</title>

<!-- ===== Pannellum (MIT) — lib 폴더의 파일 사용 ===== -->
<link rel="stylesheet" href="lib/pannellum.css">
<script src="lib/pannellum.js"></script>

<style>
  :root{
    /* 무채색(흰/검/회) 범용 테마 — 강조색은 흰색 (변수명 --gold 유지) */
    --bg:#141414; --paper:#f4f4f5; --muted:rgba(244,244,245,.6);
    --gold:#ffffff; --gold-bright:#e8e8e8;
    --glass:rgba(24,24,24,.62); --glass-strong:rgba(16,16,16,.88);
    --hair:rgba(255,255,255,.12);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:-apple-system,BlinkMacSystemFont,"Malgun Gothic","Apple SD Gothic Neo",sans-serif;
    background:var(--bg);color:var(--paper);overflow:hidden;-webkit-font-smoothing:antialiased}
  #panorama{width:100%;height:100vh}

  .scrim{position:fixed;left:0;right:0;z-index:4;pointer-events:none}
  .scrim.top{top:0;height:130px;background:linear-gradient(rgba(6,6,6,.5),transparent)}
  .scrim.bot{bottom:0;height:220px;background:linear-gradient(transparent,rgba(6,6,6,.62))}

  .brand{position:fixed;top:20px;left:22px;z-index:6;display:flex;align-items:center;gap:9px}
  .brand .mark{width:26px;height:26px;border-radius:7px;border:1.5px solid var(--gold);
    display:flex;align-items:center;justify-content:center;color:var(--gold);font-size:13px;font-weight:800;overflow:hidden}
  .brand .mark.img{border:none;background:none}
  .brand .mark img{width:100%;height:100%;object-fit:cover;display:block}
  .brand .name{font-size:13.5px;font-weight:700;letter-spacing:.02em}
  .brand .name small{display:block;font-size:10px;font-weight:600;letter-spacing:.22em;
    text-transform:uppercase;color:var(--muted);margin-top:1px}

  /* 씬 이름만 (키커·진행률 제거) */
  .scene-label{position:fixed;left:24px;bottom:128px;z-index:6}
  .scene-label .title{font-size:23px;font-weight:750;letter-spacing:-.01em;
    text-shadow:0 2px 16px rgba(0,0,0,.55);line-height:1.05}

  .dock{position:fixed;left:50%;bottom:60px;transform:translateX(-50%) translateY(0);opacity:1;z-index:7;
    width:min(720px,94vw);background:var(--glass);backdrop-filter:blur(18px) saturate(1.2);
    border:1px solid var(--hair);border-radius:18px;padding:12px 12px 10px;
    box-shadow:0 18px 50px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.05);
    transition:opacity .45s cubic-bezier(.22,.61,.36,1),transform .45s cubic-bezier(.22,.61,.36,1),visibility .45s}
  .dock.collapsed{opacity:0;transform:translateX(-50%) translateY(26px);visibility:hidden;pointer-events:none}
  /* 도크 열기/닫기 핸들 (항상 표시) */
  .dock-toggle{position:fixed;left:50%;bottom:16px;transform:translateX(-50%);z-index:8;
    display:flex;align-items:center;gap:7px;height:34px;padding:0 13px;border-radius:12px;
    background:var(--glass);border:1px solid var(--hair);color:var(--paper);cursor:pointer;
    font-size:12px;font-weight:600;backdrop-filter:blur(16px) saturate(1.2);
    box-shadow:0 8px 24px rgba(0,0,0,.4);transition:background .15s}
  .dock-toggle:hover{background:var(--glass-strong)}
  .dock-toggle .ico{width:15px;height:15px;stroke:currentColor;stroke-width:1.8;fill:none;stroke-linecap:round;stroke-linejoin:round}
  .dock-toggle .chev{width:14px;height:14px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round;transition:transform .3s}
  .dock-toggle.open .chev{transform:rotate(180deg)}
  /* 좌측 하단 로고 (표시 전용) */
  .brand-logo{position:fixed;left:22px;bottom:18px;z-index:8;max-height:50px;max-width:180px;
    object-fit:contain;pointer-events:none;filter:drop-shadow(0 2px 8px rgba(0,0,0,.55))}
  /* 나디르(바닥 가리개) — 원형 이미지, 클릭 불가 */
  .hs-nadir{pointer-events:none}
  .hs-nadir img{display:block;border-radius:50%}

  .gallery{display:flex;gap:9px;overflow-x:auto;padding:1px 1px 11px;scrollbar-width:thin;scroll-behavior:smooth}
  .gallery::-webkit-scrollbar{height:5px}
  .gallery::-webkit-scrollbar-thumb{background:rgba(255,255,255,.18);border-radius:3px}
  .thumb{flex:0 0 auto;width:120px;cursor:pointer;border-radius:11px;overflow:hidden;position:relative;
    box-shadow:0 2px 10px rgba(0,0,0,.3);transition:transform .18s cubic-bezier(.22,.61,.36,1),box-shadow .18s}
  .thumb:hover{transform:translateY(-3px);box-shadow:0 8px 20px rgba(0,0,0,.4)}
  .thumb::after{content:"";position:absolute;inset:0;border-radius:11px;border:2px solid transparent;transition:border-color .18s;pointer-events:none}
  .thumb.active::after{border-color:var(--gold)}
  .thumb.active{box-shadow:0 6px 18px rgba(255,255,255,.2)}
  .thumb img{display:block;width:120px;height:68px;object-fit:cover}
  .thumb .veil{position:absolute;inset:0;background:rgba(12,12,12,.34);transition:opacity .18s}
  .thumb.active .veil,.thumb:hover .veil{opacity:0}
  .thumb .cap{position:absolute;left:0;right:0;bottom:0;padding:14px 8px 6px;font-size:11.5px;font-weight:650;
    background:linear-gradient(transparent,rgba(6,6,6,.82));white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .thumb.active .cap{color:var(--gold-bright)}
  .thumb .num{position:absolute;top:6px;left:7px;font-size:10px;font-weight:800;color:rgba(255,255,255,.9);text-shadow:0 1px 3px rgba(0,0,0,.7)}

  .bar{display:flex;align-items:center;justify-content:center;gap:4px;padding-top:9px;border-top:1px solid var(--hair)}
  .bar button{width:40px;height:36px;border:none;border-radius:10px;cursor:pointer;background:transparent;
    color:var(--paper);display:flex;align-items:center;justify-content:center;transition:background .15s,color .15s;position:relative}
  .bar button svg{width:19px;height:19px;stroke:currentColor;stroke-width:1.7;fill:none;stroke-linecap:round;stroke-linejoin:round}
  .bar button:hover{background:rgba(255,255,255,.09)}
  .bar button.on{color:var(--bg);background:var(--gold)}
  .bar .sep{width:1px;height:20px;background:var(--hair);margin:0 6px}
  .bar button[data-tip]:hover::before{content:attr(data-tip);position:absolute;bottom:calc(100% + 8px);left:50%;
    transform:translateX(-50%);background:var(--glass-strong);color:var(--paper);font-size:11px;font-weight:600;
    padding:4px 9px;border-radius:7px;white-space:nowrap;border:1px solid var(--hair)}

  /* 이동 핫스팟 = 위치 핀(지도 마커). Pannellum 이 이 요소에 transform 을 걸어
     위치를 잡으므로 강조는 transform 대신 filter 로만 준다. */
  .hs-move{width:38px;height:46px;cursor:pointer;display:flex;align-items:center;justify-content:center;
    filter:drop-shadow(0 4px 7px rgba(0,0,0,.5));animation:pinpulse 2.4s ease-in-out infinite}
  .hs-move svg{width:38px;height:46px;display:block;overflow:visible}
  @keyframes pinpulse{0%,100%{filter:drop-shadow(0 4px 7px rgba(0,0,0,.5))}
    50%{filter:drop-shadow(0 4px 7px rgba(0,0,0,.5)) drop-shadow(0 0 7px rgba(255,255,255,.9))}}
  .hs-info{width:30px;height:30px;border-radius:50%;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);
    border:1.5px solid rgba(255,255,255,.9);display:flex;align-items:center;justify-content:center;
    color:var(--paper);font-size:14px;font-weight:700;font-style:italic;cursor:pointer;transition:transform .15s,background .15s}
  .hs-info:hover{transform:scale(1.14);background:#fff;color:#141414}
  /* 핫스팟 라벨 — 핀 위쪽 중앙, 가로 한 줄. 라벨 span 은 핫스팟 div 의 직접 자식.
     이동 핀 라벨은 항상 표시, 정보 라벨은 hover 시 표시. */
  .hs-move span,.hs-info span{position:absolute;left:50%;bottom:100%;transform:translateX(-50%);
    margin:0 0 11px 0;white-space:nowrap;pointer-events:none;
    font-size:12.5px;font-weight:600;padding:6px 12px;border-radius:9px;
    background:var(--glass-strong);border:1px solid var(--hair);color:var(--paper);box-shadow:0 6px 20px rgba(0,0,0,.45)}
  .hs-move span:after,.hs-info span:after{content:'';position:absolute;top:100%;left:50%;margin-left:-5px;width:0;height:0;
    border:5px solid transparent;border-top-color:var(--glass-strong)}
  .hs-info span{visibility:hidden}
  .hs-info:hover span{visibility:visible}
</style>
</head>
<body>
  <div class="scrim top"></div>

  <div id="panorama"></div>

    </div>
  </div>

  <button class="dock-toggle" id="dockToggle" title="갤러리 · 컨트롤 열기/닫기" aria-label="갤러리 열기/닫기">
    <svg class="ico" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
    <svg class="chev" viewBox="0 0 24 24"><path d="M6 15l6-6 6 6"/></svg>
  </button>

  <img class="brand-logo" src="images/logo.png" alt="" onerror="this.style.display='none'">

     viewer.on('mousedown', e => console.log(viewer.mouseEventToCoords(e)));

/* ---------- 이하 로직 (수정 불필요) ---------- */
const DOCK_DEFAULT_OPEN = false;   // 하단 도크 기본 상태: false=접힘(핸들만), true=펼침
const PIN='<svg viewBox="0 0 36 44"><rect width="36" height="44" fill="transparent"/><path d="M18 2.5C10.3 2.5 4 8.6 4 16.1 4 25.6 15.6 39 17.1 40.7c.5.6 1.4.6 1.9 0C20.4 39 32 25.6 32 16.1 32 8.6 25.7 2.5 18 2.5z" fill="#ffffff" stroke="#141414" stroke-width="1.5"/><circle cx="18" cy="16" r="4.6" fill="#141414"/></svg>';
let viewer, cur=0, rotating=false;
/* 진입 장면(로비)의 배열 위치. 이름표·활성 썸네일·cur 이 모두 이 값을 따라야
   뷰어는 로비인데 이름표는 다른 곳으로 뜨는 어긋남이 생기지 않는다. */
const FIRST_ID = 'scene20';
const FIRST_IDX = Math.max(0, SCENES.findIndex(function(s){return s.id===FIRST_ID;}));

function buildConfig(){
  /* 진입 장면은 로비(scene20). 배열 첫 항목(여탕_중온사우나)에서 시작하면
     손님이 사우나 안에서 갑자기 시작하게 되어 동선이 어색하다. */
  const FIRST = SCENES[FIRST_IDX].id;
  const cfg={ default:{ firstScene:FIRST, sceneFadeDuration:500, autoLoad:true, showControls:false, hfov:100 }, scenes:{} };
  SCENES.forEach(s=>{
    const spots=(s.hotSpots||[]).map(h=>{
      if(h.type==="move") return { yaw:h.yaw, pitch:h.pitch, cssClass:"hs-move",
        createTooltipFunc:moveHS, createTooltipArgs:h.text||"이동",
        clickHandlerFunc:onMoveClick, clickHandlerArgs:{ to:h.to, faceYaw:h.yaw, facePitch:h.pitch } };
      return { yaw:h.yaw, pitch:h.pitch, cssClass:"hs-info", createTooltipFunc:infoHS, createTooltipArgs:h.text||"" };
    });
    if(s.nadir && s.nadir.image) spots.push(nadirSpot(s.nadir));
    cfg.scenes[s.id]={ type:"equirectangular", panorama:s.image, yaw:s.yaw??0, pitch:s.pitch??0, hfov:s.hfov??100, hotSpots:spots };
  });
  return cfg;
}
/* 나디르: 바닥 정중앙(pitch=-90)에 고정, 줌에 따라 스케일되는 원형 이미지 */
function nadirSpot(n){ return { yaw:0, pitch:-90, cssClass:"hs-nadir", scale:true,
  createTooltipFunc:nadirHS, createTooltipArgs:n }; }
function nadirHS(div,n){ div.classList.add('hs-nadir');
  const img=document.createElement('img'); img.src=n.image; img.alt=''; img.onerror=()=>{div.style.display='none';};
  const sz=n.size||340, op=(n.opacity==null?1:n.opacity), rot=n.rotation||0;
  img.style.cssText='width:'+sz+'px;height:'+sz+'px;border-radius:50%;display:block;opacity:'+op+';transform:rotate('+rot+'deg)';
  div.appendChild(img); }

function buildGallery(){
  const g=document.getElementById('gallery');
  SCENES.forEach((s,i)=>{
    const d=document.createElement('div'); d.className='thumb'+(i===FIRST_IDX?' active':''); d.dataset.id=s.id;
    const img=document.createElement('img'); img.src=s.image; img.alt=s.name; img.loading='lazy';
    const veil=document.createElement('div'); veil.className='veil';
    const cap=document.createElement('div'); cap.className='cap'; cap.textContent=s.name;
    const num=document.createElement('div'); num.className='num'; num.textContent=String(i+1).padStart(2,'0');
    d.append(img,veil,cap,num); d.addEventListener('click',()=>goTo(s.id)); g.appendChild(d);
  });
}

function start(){
  buildGallery();
  viewer=pannellum.viewer('panorama', buildConfig());
  cur=FIRST_IDX;
  document.getElementById('sceneName').textContent=SCENES[FIRST_IDX].name;
  viewer.on('scenechange',id=>{
    const idx=SCENES.findIndex(s=>s.id===id); cur=idx;
    document.getElementById('sceneName').textContent=SCENES[idx].name;
    document.querySelectorAll('.thumb').forEach(t=>t.classList.toggle('active',t.dataset.id===id));
    const at=document.querySelector('.thumb.active'); if(at)at.scrollIntoView({inline:'center',block:'nearest'});
    if(traveling){                                   // 도착 씬에서 시작 줌으로 안정
      viewer.lookAt(SCENES[idx].pitch??-4, viewer.getYaw(), SCENES[idx].hfov??100, 650);
      traveling=false;
    }
    if(rotating)viewer.startAutoRotate(-3);
  });
  wireControls();
  wireDock();
}
/* 하단 도크 접기/펼치기 (세션 동안만 상태 유지) */
function wireDock(){
  const dock=document.getElementById('dock'), tog=document.getElementById('dockToggle');
  let open=DOCK_DEFAULT_OPEN;
  const apply=()=>{ dock.classList.toggle('collapsed',!open); tog.classList.toggle('open',open); };
  apply();
  tog.onclick=()=>{ open=!open; apply(); };
}
/* ===== 이동 모션 (스트리트뷰식 돌진 줌인) =====
   1) 핫스팟 방향으로 회전 + 화면 확 줌인(빨려드는 느낌)
   2) 다음 씬 로드 (줌인된 상태에서 페이드로 등장)
   3) scenechange 에서 살짝 줌아웃하며 안정  */
let traveling=false;
function travelTo(id, faceYaw, facePitch){
  if(!viewer || traveling || id===SCENES[cur].id) return;
  traveling=true;
  const p = (facePitch!==undefined&&facePitch!==null) ? facePitch : viewer.getPitch();
  const y = (faceYaw   !==undefined&&faceYaw   !==null) ? faceYaw   : viewer.getYaw();
  // 1) 방향으로 회전하며 확 줌인(hfov 100→35)  → 끝나면 2) 씬 로드
  viewer.lookAt(p, y, 35, 480, function(){
    const s = SCENES.find(x=>x.id===id);
    viewer.loadScene(id, s.pitch??-4, s.yaw??0, 60);   // 줌인된 시야로 등장
  });
}
function onMoveClick(evt, args){ travelTo(args.to, args.faceYaw, args.facePitch); }
/* 갤러리·이전/다음 버튼도 같은 모션 사용(방향은 현재 시점 기준) */
function goTo(id){ travelTo(id); }
function wireControls(){
  document.getElementById('btnHome').onclick=()=>{const s=SCENES[cur];viewer.setPitch(s.pitch??-4);viewer.setYaw(s.yaw??0);viewer.setHfov(s.hfov??100);};
  document.getElementById('btnPrev').onclick=()=>goTo(SCENES[(cur-1+SCENES.length)%SCENES.length].id);
  document.getElementById('btnNext').onclick=()=>goTo(SCENES[(cur+1)%SCENES.length].id);
  const rot=document.getElementById('btnRotate');
  rot.onclick=()=>{rotating=!rotating;rot.classList.toggle('on',rotating);if(rotating)viewer.startAutoRotate(-3);else viewer.stopAutoRotate();};
  document.getElementById('btnFull').onclick=()=>{if(!document.fullscreenElement)document.documentElement.requestFullscreen?.();else document.exitFullscreen?.();};
}
/* 라벨은 CSS(.pnlm-tooltip span)가 핀 위쪽 중앙에 가로로 배치 */
function infoHS(div,text){div.classList.add('hs-info');div.innerHTML='i';
  const t=document.createElement('span');t.textContent=text;div.appendChild(t);}
function moveHS(div,text){div.classList.add('hs-move');div.innerHTML=PIN;
  const t=document.createElement('span');t.textContent=text;div.appendChild(t);}

start();
</script>
