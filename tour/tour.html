<!--
================================================================================
  Claude Code 지시서 — 이 파일 하나로 360 가상투어 웹페이지를 완성해줘.

  [대상] 정적 HTML 사이트.

  [해야 할 일]
  1. 이 tour.html 이 그대로 브라우저에서 뜨도록 필요한 파일을 준비할 것.
     - 360 뷰어 라이브러리는 Pannellum (MIT). 아래 <head> 가 참조하는 경로:
         lib/pannellum.js , lib/pannellum.css
       이 두 파일을 준비해서 tour.html 과 같은 위치의 lib/ 폴더에 둘 것.
       (npm 의 'pannellum' 패키지 build/pannellum.js, build/pannellum.css 를 복사하면 됨.
        CDN https://cdnjs.cloudflare.com/ajax/libs/pannellum/2.5.6/ 도 가능하지만,
        오프라인·방화벽 대비해 로컬 lib/ 배치를 권장.)
  2. 지점 사진(equirectangular, 가로:세로 = 2:1)은 images/ 폴더에 두고,
     아래 SCENES 배열의 image 경로와 일치시킬 것. 사진은 함께 전달됨.
     사진이 아직 없으면 images/ 폴더와 자리표시 주석만 남겨둘 것.
  3. 로컬 확인은 정적 서버로:  npx serve  또는  python3 -m http.server
     (file:// 로 열면 브라우저 보안 때문에 사진이 안 뜸 — 반드시 서버로.)
  4. 사이트에 붙일 때는 이 폴더를 통째로 올리고 /tour.html 로 링크하거나
     <iframe src="tour.html" style="width:100%;height:600px;border:0"></iframe> 로 삽입.

  [편집 포인트] 아래 <script> 안의 SCENES 배열만 고치면 지점/핫스팟이 바뀜.
  [건드리지 말 것] lib/ 안의 pannellum 파일, SCENES 아래의 로직 코드.
================================================================================
-->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>골드스파사우나 · 360 가상투어</title>

<!-- ===== Pannellum (MIT) — lib 폴더의 파일 사용 ===== -->
<link rel="stylesheet" href="lib/pannellum.css">
<script src="lib/pannellum.js"></script>

<style>
  :root{
    --bg:#12100d; --paper:#f5efe4; --muted:rgba(245,239,228,.62);
    --gold:#d8b071; --gold-bright:#ecca8e;
    --glass:rgba(22,18,14,.62); --glass-strong:rgba(20,16,12,.86);
    --hair:rgba(245,239,228,.12);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:-apple-system,BlinkMacSystemFont,"Malgun Gothic","Apple SD Gothic Neo",sans-serif;
    background:var(--bg);color:var(--paper);overflow:hidden;-webkit-font-smoothing:antialiased}
  #panorama{width:100%;height:100vh}

  .scrim{position:fixed;left:0;right:0;z-index:4;pointer-events:none}
  .scrim.top{top:0;height:130px;background:linear-gradient(rgba(10,8,6,.5),transparent)}
  .scrim.bot{bottom:0;height:220px;background:linear-gradient(transparent,rgba(10,8,6,.62))}

  .brand{position:fixed;top:20px;left:22px;z-index:6;display:flex;align-items:center;gap:9px}
  .brand .mark{width:26px;height:26px;border-radius:7px;border:1.5px solid var(--gold);
    display:flex;align-items:center;justify-content:center;color:var(--gold);font-size:13px;font-weight:800}
  .brand .name{font-size:13.5px;font-weight:700;letter-spacing:.02em}
  .brand .name small{display:block;font-size:10px;font-weight:600;letter-spacing:.22em;
    text-transform:uppercase;color:var(--muted);margin-top:1px}

  /* 씬 이름만 (키커·진행률 제거) */
  .scene-label{position:fixed;left:24px;bottom:128px;z-index:6}
  .scene-label .title{font-size:23px;font-weight:750;letter-spacing:-.01em;
    text-shadow:0 2px 16px rgba(0,0,0,.55);line-height:1.05}

  .dock{position:fixed;left:50%;bottom:18px;transform:translateX(-50%) translateY(14px);opacity:0;z-index:7;
    width:min(720px,94vw);background:var(--glass);backdrop-filter:blur(18px) saturate(1.2);
    border:1px solid var(--hair);border-radius:18px;padding:12px 12px 10px;
    box-shadow:0 18px 50px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.05);
    animation:rise .6s cubic-bezier(.22,.61,.36,1) .15s forwards}
  @keyframes rise{to{opacity:1;transform:translateX(-50%) translateY(0)}}

  .gallery{display:flex;gap:9px;overflow-x:auto;padding:1px 1px 11px;scrollbar-width:thin;scroll-behavior:smooth}
  .gallery::-webkit-scrollbar{height:5px}
  .gallery::-webkit-scrollbar-thumb{background:rgba(245,239,228,.18);border-radius:3px}
  .thumb{flex:0 0 auto;width:120px;cursor:pointer;border-radius:11px;overflow:hidden;position:relative;
    box-shadow:0 2px 10px rgba(0,0,0,.3);transition:transform .18s cubic-bezier(.22,.61,.36,1),box-shadow .18s}
  .thumb:hover{transform:translateY(-3px);box-shadow:0 8px 20px rgba(0,0,0,.4)}
  .thumb::after{content:"";position:absolute;inset:0;border-radius:11px;border:2px solid transparent;transition:border-color .18s;pointer-events:none}
  .thumb.active::after{border-color:var(--gold)}
  .thumb.active{box-shadow:0 6px 18px rgba(216,176,113,.28)}
  .thumb img{display:block;width:120px;height:68px;object-fit:cover}
  .thumb .veil{position:absolute;inset:0;background:rgba(18,16,13,.34);transition:opacity .18s}
  .thumb.active .veil,.thumb:hover .veil{opacity:0}
  .thumb .cap{position:absolute;left:0;right:0;bottom:0;padding:14px 8px 6px;font-size:11.5px;font-weight:650;
    background:linear-gradient(transparent,rgba(8,6,4,.82));white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .thumb.active .cap{color:var(--gold-bright)}
  .thumb .num{position:absolute;top:6px;left:7px;font-size:10px;font-weight:800;color:rgba(245,239,228,.9);text-shadow:0 1px 3px rgba(0,0,0,.7)}

  .bar{display:flex;align-items:center;justify-content:center;gap:4px;padding-top:9px;border-top:1px solid var(--hair)}
  .bar button{width:40px;height:36px;border:none;border-radius:10px;cursor:pointer;background:transparent;
    color:var(--paper);display:flex;align-items:center;justify-content:center;transition:background .15s,color .15s;position:relative}
  .bar button svg{width:19px;height:19px;stroke:currentColor;stroke-width:1.7;fill:none;stroke-linecap:round;stroke-linejoin:round}
  .bar button:hover{background:rgba(245,239,228,.09)}
  .bar button.on{color:var(--bg);background:var(--gold)}
  .bar .sep{width:1px;height:20px;background:var(--hair);margin:0 6px}
  .bar button[data-tip]:hover::before{content:attr(data-tip);position:absolute;bottom:calc(100% + 8px);left:50%;
    transform:translateX(-50%);background:var(--glass-strong);color:var(--paper);font-size:11px;font-weight:600;
    padding:4px 9px;border-radius:7px;white-space:nowrap;border:1px solid var(--hair)}

  .hs-move{width:44px;height:44px;border-radius:50%;cursor:pointer;
    background:radial-gradient(circle at 50% 35%,var(--gold-bright),var(--gold));
    border:2.5px solid rgba(255,255,255,.95);box-shadow:0 5px 18px rgba(0,0,0,.5),0 0 0 6px rgba(216,176,113,.16);
    display:flex;align-items:center;justify-content:center;color:#3a2a12;animation:pulse 2.2s ease-in-out infinite}
  .hs-move svg{width:22px;height:22px;stroke:currentColor;stroke-width:2.4;fill:none;stroke-linecap:round;stroke-linejoin:round}
  @keyframes pulse{0%,100%{box-shadow:0 5px 18px rgba(0,0,0,.5),0 0 0 6px rgba(216,176,113,.16)}
    50%{box-shadow:0 5px 18px rgba(0,0,0,.5),0 0 0 12px rgba(216,176,113,0)}}
  .hs-info{width:30px;height:30px;border-radius:50%;background:rgba(18,16,13,.66);backdrop-filter:blur(4px);
    border:1.5px solid rgba(245,239,228,.85);display:flex;align-items:center;justify-content:center;
    color:var(--paper);font-size:14px;font-weight:700;font-style:italic;cursor:pointer;transition:transform .15s,background .15s}
  .hs-info:hover{transform:scale(1.14);background:var(--gold);color:var(--bg)}
  .pnlm-tooltip span{font-family:inherit!important;font-size:12.5px!important;font-weight:600!important;
    padding:7px 12px!important;border-radius:9px!important;background:var(--glass-strong)!important;
    border:1px solid var(--hair)!important;color:var(--paper)!important}
  .pnlm-tooltip span:after{border-top-color:rgba(20,16,12,.86)!important}
</style>
</head>
<body>
  <div class="scrim top"></div>
  <div class="scrim bot"></div>
  <div id="panorama"></div>

  <div class="brand"><span class="mark">G</span>
    <span class="name">골드스파사우나<small>Virtual Tour</small></span></div>

  <div class="scene-label"><div class="title" id="sceneName"></div></div>

  <div class="dock">
    <div class="gallery" id="gallery"></div>
    <div class="bar">
      <button id="btnHome" data-tip="처음 시점"><svg viewBox="0 0 24 24"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg></button>
      <button id="btnRotate" data-tip="자동 회전"><svg viewBox="0 0 24 24"><path d="M21 12a9 9 0 1 1-3-6.7"/><path d="M21 3v5h-5"/></svg></button>
      <span class="sep"></span>
      <button id="btnPrev" data-tip="이전"><svg viewBox="0 0 24 24"><path d="M15 5l-7 7 7 7"/></svg></button>
      <button id="btnNext" data-tip="다음"><svg viewBox="0 0 24 24"><path d="M9 5l7 7-7 7"/></svg></button>
      <span class="sep"></span>
      <button id="btnFull" data-tip="전체화면"><svg viewBox="0 0 24 24"><path d="M8 3H3v5"/><path d="M16 3h5v5"/><path d="M16 21h5v-5"/><path d="M8 21H3v-5"/></svg></button>
    </div>
  </div>

<script>
/* =====================================================================
   ★ 여기만 편집하면 됩니다 ★

   지점을 추가하려면 SCENES 배열에 블록을 하나 더 넣으세요.
     id       : 씬 고유 이름(영문/숫자, 겹치면 안 됨)
     name     : 화면에 표시될 한글 이름
     image    : images/ 폴더 안 사진 경로 (equirectangular, 가로:세로 = 2:1)
     yaw/pitch: 처음 바라보는 방향 (yaw 좌우 -180~180, pitch 상하 -90~90)
     hotSpots : 이 씬에 얹을 핫스팟들
        - move : 다른 씬으로 이동 (to = 대상 씬 id)
        - info : 설명 툴팁

   핫스팟 좌표(yaw/pitch)를 모를 땐: 뷰어를 띄우고 브라우저 콘솔에
     viewer.on('mousedown', e => console.log(viewer.mouseEventToCoords(e)));
   를 붙여넣은 뒤 원하는 지점을 클릭하면 [pitch, yaw] 가 찍힙니다.
   ===================================================================== */
const SCENES = [
  {
    id: "restarea",
    name: "휴게실",
    image: "images/01-restarea.jpg",
    yaw: 0, pitch: -4,
    hotSpots: [
      { type:"info", yaw:-95, pitch:-16, text:"안마의자 휴게 공간" },
      { type:"info", yaw:70,  pitch:-14, text:"마사지 · 안내" },
      // 키즈존으로 이동 (yaw는 실제 통로 방향에 맞게 미세조정하세요)
      { type:"move", yaw:20, pitch:-8, to:"kidszone", text:"키즈존으로" },
    ]
  },
  {
    id: "kidszone",
    name: "키즈존",
    image: "images/02-kidszone.jpg",
    yaw: 10, pitch: -5,
    hotSpots: [
      { type:"info", yaw:-40,  pitch:-18, text:"키즈존 이용시간 · AM 09:00 ~ PM 22:00" },
      { type:"info", yaw:-112, pitch:-22, text:"인형뽑기 · 게임기 존" },
      { type:"info", yaw:32,   pitch:-5,  text:"실내 놀이터 (터널 · 미끄럼틀)" },
      // 유리문 너머로 휴게실이 보이는 방향(yaw≈117) → 휴게실로 이동
      { type:"move", yaw:117, pitch:-12, to:"restarea", text:"휴게실로" },
    ]
  },
];

/* ---------- 이하 로직 (수정 불필요) ---------- */
const ARROW='<svg viewBox="0 0 24 24"><path d="M5 12h14"/><path d="M13 6l6 6-6 6"/></svg>';
let viewer, cur=0, rotating=false;

function buildConfig(){
  const cfg={ default:{ firstScene:SCENES[0].id, sceneFadeDuration:850, autoLoad:true, showControls:false, hfov:100 }, scenes:{} };
  SCENES.forEach(s=>{
    cfg.scenes[s.id]={
      type:"equirectangular", panorama:s.image, yaw:s.yaw??0, pitch:s.pitch??0,
      hotSpots:(s.hotSpots||[]).map(h=>{
        if(h.type==="move") return { yaw:h.yaw, pitch:h.pitch, cssClass:"hs-move",
          createTooltipFunc:moveHS, createTooltipArgs:h.text||"이동", sceneId:h.to };
        return { yaw:h.yaw, pitch:h.pitch, cssClass:"hs-info", createTooltipFunc:infoHS, createTooltipArgs:h.text||"" };
      })
    };
  });
  return cfg;
}

function buildGallery(){
  const g=document.getElementById('gallery');
  SCENES.forEach((s,i)=>{
    const d=document.createElement('div'); d.className='thumb'+(i===0?' active':''); d.dataset.id=s.id;
    const img=document.createElement('img'); img.src=s.image; img.alt=s.name; img.loading='lazy';
    const veil=document.createElement('div'); veil.className='veil';
    const cap=document.createElement('div'); cap.className='cap'; cap.textContent=s.name;
    const num=document.createElement('div'); num.className='num'; num.textContent=String(i+1).padStart(2,'0');
    d.append(img,veil,cap,num); d.addEventListener('click',()=>goTo(s.id)); g.appendChild(d);
  });
}

function start(){
  buildGallery();
  viewer=pannellum.viewer('panorama', buildConfig());
  document.getElementById('sceneName').textContent=SCENES[0].name;
  viewer.on('scenechange',id=>{
    const idx=SCENES.findIndex(s=>s.id===id); cur=idx;
    document.getElementById('sceneName').textContent=SCENES[idx].name;
    document.querySelectorAll('.thumb').forEach(t=>t.classList.toggle('active',t.dataset.id===id));
    const at=document.querySelector('.thumb.active'); if(at)at.scrollIntoView({inline:'center',block:'nearest'});
    if(rotating)viewer.startAutoRotate(-3);
  });
  wireControls();
}
function goTo(id){ if(viewer&&id!==SCENES[cur].id){ const s=SCENES.find(x=>x.id===id); viewer.loadScene(id,-4,s.yaw??0); } }
function wireControls(){
  document.getElementById('btnHome').onclick=()=>{const s=SCENES[cur];viewer.setPitch(s.pitch??-4);viewer.setYaw(s.yaw??0);viewer.setHfov(100);};
  document.getElementById('btnPrev').onclick=()=>goTo(SCENES[(cur-1+SCENES.length)%SCENES.length].id);
  document.getElementById('btnNext').onclick=()=>goTo(SCENES[(cur+1)%SCENES.length].id);
  const rot=document.getElementById('btnRotate');
  rot.onclick=()=>{rotating=!rotating;rot.classList.toggle('on',rotating);if(rotating)viewer.startAutoRotate(-3);else viewer.stopAutoRotate();};
  document.getElementById('btnFull').onclick=()=>{if(!document.fullscreenElement)document.documentElement.requestFullscreen?.();else document.exitFullscreen?.();};
}
function infoHS(div,text){div.classList.add('hs-info');div.innerHTML='i';
  const t=document.createElement('span');t.textContent=text;div.appendChild(t);
  div.addEventListener('mouseover',()=>{t.style.width=t.scrollWidth+'px';t.style.marginLeft=-(t.scrollWidth/2)+'px';t.style.marginTop=-t.scrollHeight-14+'px';});}
function moveHS(div,text){div.classList.add('hs-move');div.innerHTML=ARROW;
  const t=document.createElement('span');t.textContent=text;div.appendChild(t);
  div.addEventListener('mouseover',()=>{t.style.width=t.scrollWidth+'px';t.style.marginLeft=-(t.scrollWidth/2)+'px';t.style.marginTop=-t.scrollHeight-20+'px';});}

start();
</script>
</body>
</html>
